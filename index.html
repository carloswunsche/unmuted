<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzdiNWVhNyIvPjxwYXRoIGQ9Ik0xNiA0djEwLjU1QTQgNCAwIDEgMCAxOCAxN1Y5aDRWNGgtNnoiIGZpbGw9IndoaXRlIi8+PC9zdmc+">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unmuted</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #13111a;
    --bg2:      #1c1927;
    --bg3:      #252233;
    --surface:  #2e2a3e;
    --surface2: #363149;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.13);
    --text:     #f0eeff;
    --text2:    #9b96b8;
    --text3:    #5a5470;
    --accent:   #7b5ea7;
    --accent2:  #9b7fcb;
    --accent-glow: rgba(123,94,167,0.3);
    --danger:   #e06c6c;
    --blue:     #5b8dee;
    --pink:     #e05b8d;
    --green:    #4caf82;
    --radius:   14px;
    --radius-sm: 10px;
    --radius-xs: 7px;
    --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    --ease: 0.18s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="light"] {
    --bg:       #f2f2f2;
    --bg2:      #e8e8e8;
    --bg3:      #dcdcdc;
    --surface:  #ffffff;
    --surface2: #f5f5f5;
    --border:   rgba(0,0,0,0.07);
    --border2:  rgba(0,0,0,0.13);
    --text:     #111111;
    --text2:    #555555;
    --text3:    #aaaaaa;
    --danger:   #c0392b;
    --blue:     #4070d0;
    --pink:     #c03070;
    --green:    #2e9e65;
  }

  /* ── COLOR THEMES ── */
  /* accent + accent2 + accent-glow are overridden per color theme */
  [data-color="purple"]  { --accent:#7b5ea7; --accent2:#9b7fcb; --accent-glow:rgba(123,94,167,0.3); }
  [data-color="blue"]    { --accent:#3d7ae8; --accent2:#6399f0; --accent-glow:rgba(61,122,232,0.3); }
  [data-color="teal"]    { --accent:#1e9e82; --accent2:#2ec4a0; --accent-glow:rgba(30,158,130,0.3); }
  [data-color="green"]   { --accent:#3a9e52; --accent2:#4ec96a; --accent-glow:rgba(58,158,82,0.3); }
  [data-color="rose"]    { --accent:#d04070; --accent2:#e8608a; --accent-glow:rgba(208,64,112,0.3); }
  [data-color="orange"]  { --accent:#d06020; --accent2:#e87d3a; --accent-glow:rgba(208,96,32,0.3); }
  [data-color="amber"]   { --accent:#b88a00; --accent2:#d4a820; --accent-glow:rgba(184,138,0,0.3); }
  [data-color="red"]     { --accent:#c0352b; --accent2:#e04a3e; --accent-glow:rgba(192,53,43,0.3); }
  [data-color="indigo"]  { --accent:#4050c8; --accent2:#6070e0; --accent-glow:rgba(64,80,200,0.3); }
  [data-color="slate"]   { --accent:#5a7a9a; --accent2:#7a9ab8; --accent-glow:rgba(90,122,154,0.3); }

  /* also override light mode accent per color */
  [data-theme="light"][data-color="purple"]  { --accent:#6a4d96; --accent2:#523a78; --accent-glow:rgba(106,77,150,0.15); }
  [data-theme="light"][data-color="blue"]    { --accent:#2d6ad8; --accent2:#1e55b0; --accent-glow:rgba(45,106,216,0.15); }
  [data-theme="light"][data-color="teal"]    { --accent:#178e72; --accent2:#0e6e58; --accent-glow:rgba(23,142,114,0.15); }
  [data-theme="light"][data-color="green"]   { --accent:#2a8e42; --accent2:#1e6e32; --accent-glow:rgba(42,142,66,0.15); }
  [data-theme="light"][data-color="rose"]    { --accent:#c03060; --accent2:#a0204a; --accent-glow:rgba(192,48,96,0.15); }
  [data-theme="light"][data-color="orange"]  { --accent:#c05010; --accent2:#a03800; --accent-glow:rgba(192,80,16,0.15); }
  [data-theme="light"][data-color="amber"]   { --accent:#a07800; --accent2:#806000; --accent-glow:rgba(160,120,0,0.15); }
  [data-theme="light"][data-color="red"]     { --accent:#b02820; --accent2:#901810; --accent-glow:rgba(176,40,32,0.15); }
  [data-theme="light"][data-color="indigo"]  { --accent:#3040b8; --accent2:#2030a0; --accent-glow:rgba(48,64,184,0.15); }
  [data-theme="light"][data-color="slate"]   { --accent:#4a6a8a; --accent2:#3a5a7a; --accent-glow:rgba(74,106,138,0.15); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
    transition: background var(--ease), color var(--ease);
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 64px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 700; color: var(--text);
    letter-spacing: -0.3px; user-select: none;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent); border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .logo-mark svg { width: 18px; height: 18px; color: #fff; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .btn {
    font-family: var(--font); font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; border-radius: var(--radius-xs);
    padding: 0 16px; height: 36px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all var(--ease); white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px var(--accent-glow); }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  /* COLOR PICKER */
  .color-picker-wrap { position:relative; }
  .color-trigger {
    width:30px; height:30px; border-radius:50%;
    border:2px solid var(--border2);
    background:var(--accent);
    cursor:pointer; transition:all var(--ease);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px var(--accent-glow);
  }
  .color-trigger:hover { transform:scale(1.1); }
  .color-dropdown {
    position:absolute; top:calc(100% + 10px); right:0;
    background:var(--bg2); border:1px solid var(--border2);
    border-radius:var(--radius); padding:14px;
    display:none; z-index:500;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    width:200px;
  }
  .color-dropdown.open { display:block; }
  .color-dropdown-label { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
  .color-swatches { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .color-swatch {
    width:28px; height:28px; border-radius:50%;
    cursor:pointer; border:2px solid transparent;
    transition:all var(--ease); position:relative;
  }
  .color-swatch:hover { transform:scale(1.15); }
  .color-swatch.active { border-color:var(--text); }
  .color-swatch.active::after {
    content:''; position:absolute; inset:5px;
    border-radius:50%; background:rgba(255,255,255,0.5);
  }

  .theme-pill {
    display: flex; align-items: center;
    background: var(--bg3); border-radius: 20px;
    padding: 3px; gap: 2px; border: 1px solid var(--border);
  }
  .theme-opt {
    width: 30px; height: 30px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background var(--ease);
    background: transparent; border: none; color: var(--text3);
  }
  .theme-opt.on { background: var(--surface2); color: var(--accent2); }
  .theme-opt svg { width: 14px; height: 14px; }

  .main { max-width: 1060px; margin: 0 auto; padding: 36px 24px 140px; }

  .empty {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 80px 20px; gap: 14px;
  }
  .empty-bubble {
    width: 80px; height: 80px; background: var(--bg3);
    border-radius: 24px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px; border: 1px solid var(--border2);
  }
  .empty-bubble svg { width: 36px; height: 36px; color: var(--accent2); }
  .empty-title { font-size: 24px; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: 14px; color: var(--text2); max-width: 300px; }
  .empty-hint {
    font-size: 12px; color: var(--text3);
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 20px; padding: 5px 14px;
    font-family: monospace; margin-top: 6px;
  }

  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .sec-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .sec-badge {
    font-size: 11px; font-weight: 600;
    background: var(--bg3); color: var(--text3);
    border-radius: 20px; padding: 3px 10px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  .artist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .acard {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden; cursor: pointer;
    transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
  }
  .acard:hover { transform: translateY(-4px); border-color: var(--border2); box-shadow: 0 12px 32px rgba(0,0,0,0.25); }
  .acard:hover .acard-play { opacity: 1; }
  .acard-img { width: 100%; aspect-ratio: 1; background: var(--bg3); position: relative; overflow: hidden; }
  .acard-img img { width:100%; height:100%; object-fit:cover; display:block; }
  .acard-ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:52px; font-weight:700; color:var(--surface2); user-select:none; }
  .acard-play {
    position:absolute; inset:0; background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity var(--ease);
  }
  .acard-play-btn {
    width:44px; height:44px; border-radius:50%;
    background:var(--accent); display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
  }
  .acard-play-btn svg { width:20px; height:20px; color:#fff; margin-left:2px; }
  .acard-body { padding: 12px; position:relative; }
  .acard-remove {
    position:absolute; top:8px; right:8px;
    width:22px; height:22px; border-radius:50%;
    background:var(--bg3); border:1px solid var(--border2);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transition:opacity var(--ease);
    color:var(--text3);
  }
  .acard-remove:hover { background:var(--danger-bg,rgba(224,108,108,0.12)); color:var(--danger,#e06c6c); border-color:rgba(224,108,108,0.3); }
  .acard-remove svg { width:10px; height:10px; }
  .acard:hover .acard-remove { opacity:1; }
  .acard-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .acard-sub { font-size:11px; color:var(--text3); margin-top:2px; }

  .back {
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; font-weight:600; color:var(--text2);
    cursor:pointer; background:none; border:none; font-family:var(--font);
    padding:6px 0; margin-bottom:28px; transition:color var(--ease);
  }
  .back:hover { color:var(--text); }
  .back svg { width:16px; height:16px; }

  .hero { display:flex; gap:24px; margin-bottom:36px; align-items:flex-start; }
  .hero-img {
    width:150px; height:150px; flex-shrink:0;
    border-radius:var(--radius); background:var(--bg3); overflow:hidden;
    border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,0.3); position:relative;
  }
  .hero-img img { width:100%; height:100%; object-fit:cover; }
  .hero-img-ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:60px; font-weight:700; color:var(--surface2); }
  .hero-info { flex:1; }
  .hero-label { font-size:11px; font-weight:700; color:var(--accent2); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
  .hero-name { font-size:32px; font-weight:700; line-height:1.1; margin-bottom:10px; }
  .hero-bio { font-size:13px; color:var(--text2); line-height:1.7; max-width:500px; margin-bottom:14px; }
  .hero-links { display:flex; gap:8px; flex-wrap:wrap; }
  .hero-link {
    font-size:12px; font-weight:600;
    background:rgba(123,94,167,0.12); color:var(--accent2);
    border:1px solid rgba(123,94,167,0.25); border-radius:20px;
    padding:4px 12px; text-decoration:none; transition:background var(--ease);
  }
  .hero-link:hover { background:rgba(123,94,167,0.22); }

  .album-block { margin-bottom:36px; }
  .album-head { display:flex; gap:16px; align-items:center; margin-bottom:16px; }
  .album-cover {
    width:72px; height:72px; flex-shrink:0;
    border-radius:var(--radius-sm); background:var(--bg3);
    overflow:hidden; border:1px solid var(--border); position:relative;
  }
  .album-cover img { width:100%; height:100%; object-fit:cover; }
  .album-cover-ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text3); }
  .album-name { font-size:17px; font-weight:700; margin-bottom:2px; }
  .album-meta { font-size:12px; color:var(--text3); }

  .tracklist { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; }
  .trow {
    display:flex; align-items:center; gap:12px;
    padding:11px 16px; cursor:pointer;
    border-bottom:1px solid var(--border); transition:background var(--ease);
  }
  .trow:last-child { border-bottom:none; }
  .trow:hover { background:var(--surface2); }
  .trow.now { background:rgba(123,94,167,0.12); }
  .tnum { width:22px; text-align:center; font-size:12px; color:var(--text3); font-weight:600; flex-shrink:0; }
  .trow.now .tnum { display:none; }
  .tnow-icon { width:22px; display:none; align-items:center; justify-content:center; flex-shrink:0; }
  .trow.now .tnow-icon { display:flex; }
  .tnow-icon svg { width:14px; height:14px; color:var(--accent2); }
  .tinfo { flex:1; min-width:0; }
  .ttitle { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .trow.now .ttitle { color:var(--accent2); }
  .tdur { font-size:12px; color:var(--text3); flex-shrink:0; }

  .player {
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    background:var(--bg2); border-top:1px solid var(--border2);
    height:76px; display:flex; align-items:center;
    padding:0 24px; gap:16px;
  }
  .p-thumb { width:46px; height:46px; flex-shrink:0; border-radius:var(--radius-xs); background:var(--bg3); overflow:hidden; border:1px solid var(--border); }
  .p-thumb img { width:100%; height:100%; object-fit:cover; }
  .p-info { min-width:0; flex:0 0 180px; }
  .p-title { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .p-artist { font-size:11px; color:var(--text3); margin-top:1px; }
  .p-ctrls { display:flex; align-items:center; gap:4px; }
  .pcb {
    background:none; border:none; cursor:pointer; color:var(--text2);
    padding:8px; border-radius:8px;
    display:flex; align-items:center; justify-content:center; transition:all var(--ease);
  }
  .pcb:hover { color:var(--text); background:var(--bg3); }
  .pcb.pp { width:40px; height:40px; border-radius:50%; background:var(--accent); color:#fff; }
  .pcb.pp:hover { background:var(--accent2); }
  .pcb svg { width:18px; height:18px; }
  .pcb.pp svg { width:20px; height:20px; }
  .p-prog { flex:1; display:flex; align-items:center; gap:10px; }
  .p-time { font-size:11px; color:var(--text3); min-width:34px; font-variant-numeric:tabular-nums; }
  .p-bar { flex:1; height:4px; background:var(--bg3); border-radius:2px; cursor:pointer; }
  .p-fill { height:100%; background:var(--accent); border-radius:2px; width:0%; transition:width .2s linear; }
  .p-vol { display:flex; align-items:center; gap:8px; }
  .p-vol svg { width:15px; height:15px; color:var(--text3); flex-shrink:0; }
  .vol-range { -webkit-appearance:none; width:80px; height:4px; background:var(--bg3); border-radius:2px; outline:none; cursor:pointer; }
  .vol-range::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--text2); cursor:pointer; }

  .overlay {
    position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,0.65); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; pointer-events:none; transition:opacity var(--ease);
  }
  .overlay.on { opacity:1; pointer-events:all; }
  .modal {
    background:var(--bg2); border:1px solid var(--border2);
    border-radius:20px; padding:28px;
    width:100%; max-width:460px;
    transform:translateY(16px) scale(0.97);
    transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1);
  }
  .overlay.on .modal { transform:translateY(0) scale(1); }
  .modal-title { font-size:20px; font-weight:700; margin-bottom:4px; }
  .modal-sub { font-size:13px; color:var(--text2); margin-bottom:22px; line-height:1.6; }
  .field-label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:7px; }
  .field-input {
    width:100%; background:var(--bg3); border:1px solid var(--border2);
    border-radius:var(--radius-xs); padding:11px 14px;
    font-family:var(--font); font-size:13px; color:var(--text);
    outline:none; transition:border-color var(--ease);
  }
  .field-input::placeholder { color:var(--text3); }
  .field-input:focus { border-color:var(--accent); }
  .modal-err { font-size:12px; color:var(--danger); margin-top:8px; display:none; }
  .modal-err.on { display:block; }
  .preview {
    background:var(--bg3); border:1px solid var(--border2);
    border-radius:var(--radius); padding:14px; margin-top:14px;
    display:none; align-items:center; gap:14px;
  }
  .preview.on { display:flex; }
  .prev-img { width:52px; height:52px; flex-shrink:0; border-radius:10px; background:var(--surface); overflow:hidden; border:1px solid var(--border); position:relative; }
  .prev-img img { width:100%; height:100%; object-fit:cover; }
  .prev-ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:var(--text3); }
  .prev-name { font-size:15px; font-weight:700; margin-bottom:2px; }
  .prev-sub { font-size:12px; color:var(--text3); }
  .modal-row { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:20px; }
  .spin { width:18px; height:18px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:none; }
  .spin.on { display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .toast {
    position:fixed; bottom:90px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:20px; padding:9px 18px;
    font-size:13px; font-weight:500; color:var(--text);
    z-index:400; opacity:0; pointer-events:none;
    transition:all .22s; white-space:nowrap;
  }
  .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SINGLES TRACK WITH COVER */
  .trow-single { display:flex; align-items:center; gap:12px; padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background var(--ease); }
  .trow-single:last-child { border-bottom:none; }
  .trow-single:hover { background:var(--surface2); }
  .trow-single.now { background:rgba(123,94,167,0.12); }
  .trow-single-cover { width:46px; height:46px; flex-shrink:0; border-radius:var(--radius-xs); background:var(--bg3); overflow:hidden; border:1px solid var(--border); position:relative; }
  .trow-single-cover img { width:100%; height:100%; object-fit:cover; display:none; }
  .trow-single-cover img.loaded { display:block; }
  .trow-single-cover-ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text3); }
  .trow-single-info { flex:1; min-width:0; }
  .trow-single-title { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .trow-single.now .trow-single-title { color:var(--accent2); }
  .trow-single-meta { font-size:11px; color:var(--text3); margin-top:1px; }
  .trow-single-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .trow-single-dur { font-size:12px; color:var(--text3); font-variant-numeric:tabular-nums; }
  .trow-single-now { width:14px; height:14px; color:var(--accent2); display:none; }
  .trow-single.now .trow-single-now { display:block; }
  .trow-single.now .trow-single-dur { display:none; }

  /* LYRICS */
  .lyrics-btn {
    background:none; border:none; cursor:pointer;
    color:var(--text3); padding:6px 8px; border-radius:6px;
    font-family:var(--font); font-size:11px; font-weight:600;
    text-transform:uppercase; letter-spacing:.06em;
    transition:all var(--ease); display:flex; align-items:center; gap:5px;
  }
  .lyrics-btn:hover { color:var(--text2); background:var(--bg3); }
  .lyrics-btn svg { width:13px; height:13px; }
  .lyrics-btn.active { color:var(--accent2); }

  /* LYRICS PANEL — full width, slides up above player on all screen sizes */
  .detail-wrap { display:block; }
  .detail-main { display:block; }
  .lyrics-panel {
    position:fixed; bottom:76px; left:0; right:0; z-index:190;
    background:var(--bg2); border-top:1px solid var(--border2);
    max-height:40vh;
    transform:translateY(100%);
    visibility:hidden;
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1), visibility 0s linear 0.3s;
    display:flex; flex-direction:column;
  }
  .lyrics-panel.up { transform:translateY(0); visibility:visible; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1), visibility 0s linear 0s; }
  .lyrics-panel-header {
    flex-shrink:0;
    padding:10px 24px 8px;
    border-bottom:1px solid var(--border);
    background:var(--bg2);
    display:flex; align-items:center; justify-content:center;
  }
  .lyrics-panel-label { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; }
  .lyrics-panel-scroll { flex:1; overflow-y:auto; }
  .lyrics-panel-text {
    padding:14px 24px 24px;
    max-width:600px; margin:0 auto;
    text-align:center;
  }
  .lrc-line { font-size:13px; color:var(--text2); line-height:1.5; padding:3px 0; transition:color .25s, font-weight .25s; display:block; border-radius:4px; }
  @media (hover: hover) {
    .lrc-line[onclick]:hover { color:var(--text) !important; }
  }
  .lrc-line.active { color:var(--text); font-weight:700; font-size:14px; }
  .lrc-line-blank { height:10px; display:block; }
  @media(max-width:600px) {
    .lyrics-panel { max-height:45vh; }
    .lyrics-panel-header { padding:8px 16px 7px; }
    .lyrics-panel-text { padding:12px 16px 20px; }
    .lrc-line { font-size:12px; }
    .lrc-line.active { font-size:13px; }
  }

  /* RECOMMENDATIONS */
  .recs-section { margin-top:32px; }
  .recs-title { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; }
  .recs-list { display:flex; flex-direction:column; gap:10px; }
  .rec-card { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; cursor:pointer; transition:background var(--ease), border-color var(--ease); }
  .rec-card:hover { background:var(--surface2); border-color:var(--border2); }
  .rec-av { width:40px; height:40px; border-radius:50%; background:var(--bg3); border:1px solid var(--border); overflow:hidden; flex-shrink:0; position:relative; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:var(--text3); }
  .rec-av img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .rec-av span { position:relative; }
  .rec-info { flex:1; min-width:0; }
  .rec-name { font-size:13px; font-weight:600; color:var(--text); }
  .rec-bio { font-size:11px; color:var(--text3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* ADD card in grid */
  .acard-add { opacity:0.5; transition:opacity var(--ease), transform var(--ease); }
  .acard-add:hover { opacity:1; transform:translateY(-4px); }
  .acard-add .acard-img { min-height:120px; }

  @media(max-width:600px){
    /* Topbar */
    .topbar { padding:0 14px; height:56px; }
    .logo { font-size:17px; }
    .logo-mark { width:28px; height:28px; border-radius:7px; }
    .logo-mark svg { width:15px; height:15px; }
    .btn { height:32px; padding:0 12px; font-size:12px; }
    .color-trigger { width:26px; height:26px; }
    .theme-pill { padding:2px; }
    .theme-opt { width:26px; height:26px; }

    /* Main */
    .main { padding:20px 14px 120px; }

    /* Hero */
    .hero { flex-direction:column; gap:0; align-items:center; text-align:center; margin-bottom:24px; }
    .hero-img { width:120px; height:120px; border-radius:var(--radius); margin-bottom:16px; }
    .hero-img-ph { font-size:48px; }
    .hero-label { display:none; }
    .hero-name { font-size:26px; margin-bottom:8px; }
    .hero-bio { font-size:13px; margin-bottom:12px; }
    .hero-links { justify-content:center; }

    /* Artist grid */
    .artist-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }

    /* Tracklist */
    .trow { padding:10px 12px; }
    .trow-single { padding:9px 12px; gap:10px; }
    .trow-single-cover { width:40px; height:40px; }
    .album-head { gap:12px; }
    .album-cover { width:60px; height:60px; }
    .album-name { font-size:15px; }

    /* Player */
    .player { padding:0 14px; gap:8px; height:68px; }
    .p-thumb { width:40px; height:40px; }
    .p-title { font-size:12px; }
    .p-artist { font-size:10px; }
    .p-prog,.p-vol { display:none; }
    .p-info { flex:1; min-width:0; }
    .pcb svg { width:16px; height:16px; }
    .pcb.pp { width:36px; height:36px; }
    .pcb.pp svg { width:17px; height:17px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo" onclick="goBack()" style="cursor:pointer" title="Back to collection">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
    </div>
    Unmuted
  </div>
  <div class="topbar-right">
    <!-- Color picker -->
    <div class="color-picker-wrap" id="color-picker-wrap">

      </button>
      <button class="theme-opt" id="t-light" onclick="setTheme('light')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="main">
  <div id="view-col">
    <div id="empty" class="empty">
      <div class="empty-bubble">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="empty-title">Nothing here yet!</div>
      <p class="empty-sub">Add an artist using their Unmuted link — find it in their bio or scan their QR code.</p>
      <button class="btn btn-primary" onclick="openModal()" style="margin-top:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    <div id="library" style="display:none">
      <div class="sec-head">
        <span class="sec-title">Your artists</span>
        <span class="sec-badge" id="acount"></span>
      </div>
      <div class="artist-grid" id="grid"></div>
    </div>
  </div>

  <div id="view-detail" style="display:none">
    <button class="back" id="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="back-label">My artists</span>
    </button>
    <div class="detail-wrap">
      <div class="detail-main" id="detail-body"></div>
    </div>
  </div>
</main>

<div class="player" id="player" style="display:flex">
  <div class="p-thumb"><img id="p-cover" src="" style="display:none"></div>
  <div class="p-info">
    <div class="p-title" id="p-title">—</div>
    <div class="p-artist" id="p-artist">—</div>
  </div>
  <div class="p-ctrls">
    <button class="pcb" onclick="prevT()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
    <button class="pcb pp" id="pp" onclick="togglePlay()">
      <svg id="ico-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <button class="pcb" onclick="nextT()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.53 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg></button>
  </div>
  <div class="p-prog">
    <span class="p-time" id="t-cur">0:00</span>
    <div class="p-bar" id="pbar" onclick="seek(event)"><div class="p-fill" id="pfill"></div></div>
    <span class="p-time" id="t-tot">0:00</span>
  </div>
  <div class="p-vol">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" class="vol-range" min="0" max="100" value="80" oninput="setVol(this.value)">
  </div>
  <button class="lyrics-btn" id="lyrics-btn" onclick="toggleLyrics()" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Lyrics
  </button>
</div>

<!-- Lyrics panel — slides up above player -->
<div class="lyrics-panel" id="lyrics-panel">
  <div class="lyrics-panel-header">
    <span class="lyrics-panel-label">Lyrics</span>
  </div>
  <div class="lyrics-panel-scroll" id="lyrics-panel-scroll">
    <div class="lyrics-panel-text" id="lyrics-panel-text"></div>
  </div>
</div>

<div class="overlay" id="overlay" onmousedown="overlayMouseDown(event)" onmouseup="overlayMouseUp(event)">
  <div class="modal">
    <div class="modal-title">Add an artist</div>
    <!-- Tab toggle -->
    <div style="display:flex;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:16px">
      <button id="add-tab-link" onclick="setAddTab('link')" style="flex:1;border:none;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:12px;font-weight:600;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all var(--ease)">Paste link</button>
      <button id="add-tab-gh" onclick="setAddTab('gh')" style="flex:1;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:12px;font-weight:600;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all var(--ease)">GitHub repository</button>
    </div>
    <!-- Paste link panel -->
    <div id="add-panel-link">
      <div class="field-label">Artist link</div>
      <input class="field-input" id="url-input" type="url"
        placeholder="https://username.github.io/music/artist.json"
        oninput="resetPreview()"
        onkeydown="if(event.key==='Enter') doFetch()">
    </div>
    <!-- GitHub username panel -->
    <div id="add-panel-gh" style="display:none">
      <div class="field-label">GitHub username</div>
      <input class="field-input" id="gh-user-input" type="text" placeholder="their-github-username"
        oninput="resetPreview()" onkeydown="if(event.key==='Enter') doFetchGh()">
      <div class="field-label" style="margin-top:10px">Repo name <span style="color:var(--text3);font-weight:400">(default: music)</span></div>
      <input class="field-input" id="gh-repo-input" type="text" placeholder="music"
        onkeydown="if(event.key==='Enter') doFetchGh()">
    </div>
    <div class="modal-err" id="merr"></div>
    <div class="preview" id="prev">
      <div class="prev-img">
        <img id="prev-img" src="" style="display:none">
        <div class="prev-ph" id="prev-ph"></div>
      </div>
      <div>
        <div class="prev-name" id="prev-name"></div>
        <div class="prev-sub" id="prev-sub"></div>
      </div>
    </div>
    <div class="modal-row">
      <div class="spin" id="spin"></div>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-ghost" id="btn-look" onclick="document.getElementById('add-tab-gh').style.background.includes('surface')?doFetchGh():doFetch()">Look up</button>

<div class="toast" id="toast"></div>
<audio id="aud"></audio>

<script>
let col = JSON.parse(localStorage.getItem('un_col') || '[]');
let theme = localStorage.getItem('un_theme') || 'dark';
let pending = null;
let queue = [], qi = -1, playing = false;
let detailArtistIdx = -1;
const aud = document.getElementById('aud');

function boot() {
  applyTheme(theme);
  // Show idle player state
  document.getElementById('p-title').textContent = 'Nothing playing';
  document.getElementById('p-artist').textContent = 'Pick an artist to start';
  document.documentElement.setAttribute('data-color', colorId);
  const c = COLORS.find(c => c.id === colorId);
  const trigger = document.getElementById('color-trigger');
  if (trigger && c) trigger.style.background = c.hex;
  buildColorSwatches();
  render();
  aud.volume = 0.8;
  aud.addEventListener('timeupdate', onTick);
  aud.addEventListener('ended', nextT);
  aud.addEventListener('loadedmetadata', () => {
    document.getElementById('t-tot').textContent = fmt(aud.duration);
  });
  // Deep link: handle /add#url — open artist detail directly
  const h = location.hash;
  const path = location.pathname;
  let deepUrl = null;
  if (h && h.startsWith('#http')) deepUrl = decodeURIComponent(h.slice(1));
  else if (path.includes('/add') && h) {
    const u = decodeURIComponent(h.replace('#',''));
    if (u.startsWith('http')) deepUrl = u;
  }
  if (deepUrl) {
    // Clear the ugly /add#... from the URL bar
    history.replaceState(null, '', '/');
    // Reset nav so back goes to collection
    navHistory = [];
    previousArtistIdx = -1;
    openArtistPreview(deepUrl);
  }
  refreshCollection();
}

async function refreshCollection() {
  if (!col.length) return;
  let anyUpdated = false;
  const updated = await Promise.all(col.map(async (artist) => {
    try {
      const r = await fetch(artist._url + '?t=' + Date.now());
      if (!r.ok) return artist;
      const fresh = await r.json();
      if (!fresh.name) return artist;
      const base = baseOf(artist._url);
      if (fresh.releases) {
        fresh.releases = (await Promise.all(fresh.releases.map(async alb => {
          if (typeof alb === 'string') {
            const albUrl = resUrl(base, alb);
            try {
              const ar = await fetch(albUrl + '?t=' + Date.now());
              if (!ar.ok) return null;
              const albData = await ar.json();
              albData._base = baseOf(albUrl);
              return albData;
            } catch { return null; }
          }
          if (!alb._base) alb._base = base;
          return alb;
        }))).filter(Boolean);
      }
      fresh._url = artist._url;
      const changed = JSON.stringify(fresh) !== JSON.stringify(artist);
      if (changed) anyUpdated = true;
      return fresh;
    } catch { return artist; }
  }));
  if (anyUpdated) {
    col = updated;
    localStorage.setItem('un_col', JSON.stringify(col));
    render();
    if (detailArtistIdx >= 0) showDetail(detailArtistIdx);
  }
}

const COLORS = [
  { id:'purple', hex:'#7b5ea7', label:'Purple'  },
  { id:'blue',   hex:'#3d7ae8', label:'Blue'    },
  { id:'teal',   hex:'#1e9e82', label:'Teal'    },
  { id:'green',  hex:'#3a9e52', label:'Green'   },
  { id:'rose',   hex:'#d04070', label:'Rose'    },
  { id:'orange', hex:'#d06020', label:'Orange'  },
  { id:'amber',  hex:'#b88a00', label:'Amber'   },
  { id:'red',    hex:'#c0352b', label:'Red'     },
  { id:'indigo', hex:'#4050c8', label:'Indigo'  },
  { id:'slate',  hex:'#5a7a9a', label:'Slate'   },
];
let colorId = localStorage.getItem('un_color') || 'purple';

function buildColorSwatches() {
  const wrap = document.getElementById('color-swatches');
  if (!wrap) return;
  wrap.innerHTML = COLORS.map(c =>
    `<div class="color-swatch ${c.id === colorId ? 'active' : ''}"
      style="background:${c.hex}"
      title="${c.label}"
      onclick="setColor('${c.id}')"></div>`
  ).join('');
}

function setColor(id) {
  colorId = id;
  localStorage.setItem('un_color', id);
  document.documentElement.setAttribute('data-color', id);
  const c = COLORS.find(c => c.id === id);
  const trigger = document.getElementById('color-trigger');
  if (trigger && c) trigger.style.background = c.hex;
  buildColorSwatches();
  document.getElementById('color-dropdown').classList.remove('open');
}

function toggleColorPicker() {
  document.getElementById('color-dropdown').classList.toggle('open');
}

// Close picker when clicking outside
document.addEventListener('click', e => {
  const wrap = document.getElementById('color-picker-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('color-dropdown').classList.remove('open');
  }
});

function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('un_theme', t);
  document.getElementById('t-dark').classList.toggle('on', t === 'dark');
  document.getElementById('t-light').classList.toggle('on', t === 'light');
}
function setTheme(t) { applyTheme(t); }

function render() {
  const empty = document.getElementById('empty');
  const lib = document.getElementById('library');
  const grid = document.getElementById('grid');
  if (!col.length) { empty.style.display = 'flex'; lib.style.display = 'none'; return; }
  empty.style.display = 'none'; lib.style.display = 'block';
  const n = col.length;
  document.getElementById('acount').textContent = n + (n === 1 ? ' artist' : ' artists');
  const addCard = `<div class="acard acard-add" onclick="openModal()" title="Follow a new artist">
    <div class="acard-img" style="display:flex;align-items:center;justify-content:center;background:var(--bg3)">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <div class="acard-body"><div class="acard-name" style="color:var(--text3)">Add an artist</div></div>
  </div>`;
  grid.innerHTML = col.map((a, i) => {
    const base = baseOf(a._url);
    const av = a.avatar ? resUrl(base, a.avatar) : null;
    const albs = (a.releases || []).length;
    return `<div class="acard" onclick="showDetail(${i})">
      <div class="acard-img">
        ${av ? `<img src="${av}" alt="${esc(a.name)}" onload="this.nextElementSibling.style.display='none'" onerror="this.style.display='none'">` : ''}

function goBack() {
  lyricsOpen = false;
  applyLyricsOpen(false);
  if (lrcInterval) { clearInterval(lrcInterval); lrcInterval = null; }
  document.getElementById('lyrics-btn').classList.remove('active');

  const prev = navHistory.pop();
  if (!prev) {
    // Nothing in history — always go to collection
    detailArtistIdx = -1;
    previewArtist = null;
    navHistory = [];
    document.getElementById('back-label').textContent = 'My artists';
    document.getElementById('view-col').style.display = 'block';
    document.getElementById('view-detail').style.display = 'none';
    return;
  }
  if (prev && prev.type === 'artist' && prev.idx >= 0 && prev.idx < col.length) {
    // Back to a followed artist
    previewArtist = null;
    detailArtistIdx = prev.idx;
    // Set back label to whatever is now on top of history
    const top = navHistory[navHistory.length - 1];
    document.getElementById('back-label').textContent = top ? (top.type === 'artist' ? col[top.idx]?.name : top.artist?.name) || 'Back' : 'My artists';
    showDetail(prev.idx);
  } else if (prev && prev.type === 'preview' && prev.artist) {
    // Back to a previous preview
    previewArtist = prev.artist;
    const top = navHistory[navHistory.length - 1];
    document.getElementById('back-label').textContent = top ? (top.type === 'artist' ? col[top.idx]?.name : top.artist?.name) || 'Back' : 'My artists';
    showArtistPreviewDetail(prev.artist, col.some(a => a._url === prev.artist._url), true);
  } else {
    // Back to collection — clear everything
    detailArtistIdx = -1;
    previewArtist = null;
    navHistory = [];
    document.getElementById('back-label').textContent = 'My artists';
    document.getElementById('view-col').style.display = 'block';
    document.getElementById('view-detail').style.display = 'none';
  }
}

function buildQueue(ai) {
  const a = col[ai];
  const base = baseOf(a._url);
  queue = [];
  (a.releases || []).forEach((alb, ali) => {
    const albBase = alb._base || base;
    const albCover = alb.cover ? resUrl(albBase, alb.cover) : null;
    (alb.tracks || []).forEach((t, ti) => {
      // Resolve src based on context:
      // - fromSingle / playlist: path is repo-root-relative (e.g. singles/this-time.mp3)
      // - singles release: path is relative to the singles folder (e.g. this-time.mp3)
      // - album/EP: path is relative to the album folder
      const src = (t.fromSingle || alb.type === 'playlist')
        ? resUrl(base, t.src)
        : resUrl(albBase, t.src);
      // Singles use per-track cover; albums/EPs/playlists use release-level cover
      const cv = alb.type === 'singles'
        ? (t.cover ? resUrl(albBase, t.cover) : null)
        : albCover;
      queue.push({ title: t.title, artist: a.name, src, cover: cv, lyrics: t.lyrics||null, ali, ti });
    });
  });
}

function play(ai, ali, ti) {
  buildQueue(ai);
  qi = queue.findIndex(q => q.ali === ali && q.ti === ti);
  if (qi < 0) qi = 0;
  load();
}

function load() {
  if (qi < 0 || qi >= queue.length) return;
  const t = queue[qi];
  console.log('Loading track:', t.src);
  aud.src = t.src;
  aud.load();
  aud.addEventListener('canplay', () => {
    console.log('canplay fired, readyState:', aud.readyState);
    aud.play().then(() => console.log('playing!')).catch(e => console.error('play failed:', e));
  }, { once: true });
  aud.addEventListener('error', (e) => console.error('audio error:', aud.error?.code, aud.error?.message), { once: true });
  playing = true;
  const ptEl = document.getElementById('p-title'); ptEl.textContent = t.title; ptEl.style.color = '';
  document.getElementById('p-artist').textContent = t.artist;
  const img = document.getElementById('p-cover');
  if (t.cover) { img.src = t.cover; img.style.display = 'block'; } else { img.style.display = 'none'; }
  updateLyrics(t);
  updatePP(); refreshHL();
}

function togglePlay() {
  if (!aud.src) return;
  if (playing) {
    aud.pause();
    playing = false;
    updatePP();
  } else {
    if (aud.readyState >= 2) {
      aud.play().catch(() => {});
    } else {
      aud.addEventListener('canplay', () => aud.play().catch(() => {}), { once: true });
    }
    playing = true;
    updatePP();
  }
}
function prevT() {
  if (aud.currentTime > 3) { aud.currentTime = 0; return; }
  if (qi > 0) { qi--; load(); } else { aud.currentTime = 0; }
}
function nextT() {
  if (qi < queue.length - 1) { qi++; load(); }
  else { endOfQueue(); }
}

function endOfQueue() {
  playing = false;
  aud.currentTime = 0;
  updatePP();
  // Clear track highlight
  document.querySelectorAll('.trow, .trow-single').forEach(r => r.classList.remove('now'));
  // Reset progress bar and time
  document.getElementById('pfill').style.width = '0%';
  document.getElementById('t-cur').textContent = '0:00';
  // Reset player bar to first track in queue
  qi = 0;
  if (queue.length > 0) {
    const t = queue[0];
    const ptEl = document.getElementById('p-title'); ptEl.textContent = t.title; ptEl.style.color = '';
    document.getElementById('p-artist').textContent = t.artist;
    const img = document.getElementById('p-cover');
    if (t.cover) { img.src = t.cover; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
    document.getElementById('t-tot').textContent = fmt(queue[0].src ? (aud.duration || 0) : 0);
    // Preload first track so duration shows correctly
    aud.src = t.src;
    aud.load();
  }
}
function updatePP() {
  document.getElementById('ico-play').style.display = playing ? 'none' : 'block';
  document.getElementById('ico-pause').style.display = playing ? 'block' : 'none';
}
function refreshHL() {
  document.querySelectorAll('.trow, .trow-single').forEach(r => r.classList.remove('now'));
  if (qi >= 0 && queue[qi]) {
    const el = document.getElementById(`tr-${queue[qi].ali}-${queue[qi].ti}`);
    if (el) el.classList.add('now');
  }
}
function onTick() {
  const c = aud.currentTime, d = aud.duration || 0;
  document.getElementById('t-cur').textContent = fmt(c);
  document.getElementById('pfill').style.width = d ? (c / d * 100) + '%' : '0%';
}
function seek(e) {
  const b = document.getElementById('pbar');
  if (aud.duration) aud.currentTime = (e.offsetX / b.offsetWidth) * aud.duration;
}
function setVol(v) { aud.volume = v / 100; }

async function openArtistPreview(url) {
  // Push current state to history BEFORE navigating
  if (detailArtistIdx >= 0) {
    navHistory.push({ type: 'artist', idx: detailArtistIdx });
    document.getElementById('back-label').textContent = col[detailArtistIdx]?.name || 'Back';
  } else if (previewArtist) {
    navHistory.push({ type: 'preview', artist: previewArtist });
    document.getElementById('back-label').textContent = previewArtist.name || 'Back';
  }
  // If navHistory is empty and neither is set, we came from collection or deep link — back goes to collection
  if (navHistory.length === 0) {
    document.getElementById('back-label').textContent = 'My artists';
  }
  // Fetch the artist and show their page with a Follow button
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('Could not reach that link');
    const d = await r.json();
    if (!d.name) throw new Error('Not a valid Unmuted artist');
    const base = baseOf(url);
    if (d.releases) {
      d.releases = (await Promise.all(d.releases.map(async alb => {
        if (typeof alb === 'string') {
          const albUrl = resUrl(base, alb);
          try {
            const ar = await fetch(albUrl);
            if (!ar.ok) return null;
            const albData = await ar.json();
            albData._base = baseOf(albUrl);
            return albData;
          } catch { return null; }
        }
        if (!alb._base) alb._base = base;
        return alb;
      }))).filter(Boolean);
    }
    d._url = url;
    previewArtist = d;
    // Check if already following
    const alreadyFollowing = col.some(a => a._url === url);
    showArtistPreviewDetail(d, alreadyFollowing);
  } catch(e) {
    toast('Could not load that artist: ' + e.message);
  }
}

        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:14px">
          <button id="preview-share-btn" onclick="copyPreviewLink()" style="display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--accent);border-radius:var(--radius-xs);padding:6px 14px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--accent2);cursor:pointer;transition:all var(--ease)" onmouseover="this.style.background='rgba(123,94,167,0.1)'" onmouseout="this.style.background='none'">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
          ${followBtnHtml}
        </div>
      </div>
    </div>${albums}`;

  // Render recommendations for preview artist too
  let previewRecsHtml = '';
  if ((a.recommendations || []).length) {
    previewRecsHtml = `<div class="recs-section"><div class="recs-title">Recommended artists</div><div class="recs-list" id="recs-list-preview"></div></div>`;
  }
  if (previewRecsHtml) {
    document.getElementById('detail-body').innerHTML += previewRecsHtml;
    const recList = document.getElementById('recs-list-preview');
    if (recList) {
      a.recommendations.forEach(url => {
        fetch(url).then(r => r.json()).then(d => {
          if (!d.name) return;
          const base2 = baseOf(url);
          const av2 = d.avatar ? resUrl(base2, d.avatar) : null;
          const alreadyFollowing = col.some(c => c._url === url);
          const card = document.createElement('div');
          card.className = 'rec-card';
          card.innerHTML = `<div class="rec-av">${av2 ? `<img src="${av2}" onload="this.nextElementSibling.style.display='none'" onerror="this.style.display='none'">` : ''}<span>${d.name.charAt(0)}</span></div>
            <div class="rec-info"><div class="rec-name">${esc(d.name)}</div>${d.bio ? `<div class="rec-bio">${esc(d.bio.slice(0,60))}${d.bio.length>60?'...':''}</div>` : ''}</div>
            ${alreadyFollowing ? `<span style="flex-shrink:0;font-size:11px;font-weight:600;color:var(--green);padding:3px 8px;background:rgba(76,175,130,0.12);border-radius:20px;border:1px solid rgba(76,175,130,0.25)">Following</span>` : ''}`;
          card.onclick = () => openArtistPreview(url);
          recList.appendChild(card);
        }).catch(() => {});
      });
    }
  }

  document.getElementById('view-col').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  // Build queue from preview artist
  buildQueueFromArtist(a);
}

function followPreviewArtist() {
  if (!previewArtist) return;
  if (col.some(a => a._url === previewArtist._url)) { toast('Already following!'); return; }
  col.push(previewArtist);
  localStorage.setItem('un_col', JSON.stringify(col));
  render();
  toast(previewArtist.name + ' added \uD83C\uDF89');
  const btn = document.getElementById('preview-follow-btn');
  if (btn) {
    btn.textContent = '\u2713 Following';
    btn.style.cssText = 'display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid var(--border2);border-radius:var(--radius-xs);padding:6px 14px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all var(--ease)';
    btn.onclick = unfollowPreviewArtist;
  }
}

function unfollowPreviewArtist() {
  if (!previewArtist) return;
  col = col.filter(a => a._url !== previewArtist._url);
  localStorage.setItem('un_col', JSON.stringify(col));
  render();
  toast(previewArtist.name + ' unfollowed');
  const btn = document.getElementById('preview-follow-btn');
  if (btn) {
    btn.textContent = '+ Follow';
    btn.style.cssText = 'display:inline-flex;align-items:center;gap:5px;background:var(--accent);border:1px solid var(--accent);border-radius:var(--radius-xs);padding:6px 14px;font-family:var(--font);font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:all var(--ease);box-shadow:0 2px 8px var(--accent-glow)';
    btn.onclick = followPreviewArtist;
  }
}

function copyPreviewLink() {
  const url = previewArtist?._url;
  if (!url) return;
  const deep = 'https://unmuted-music.netlify.app/add#' + url;
  navigator.clipboard.writeText(deep).then(() => toast('Link copied! \uD83D\uDD17'));
}

function previewPlay(ai, ti) {
  if (!previewArtist) return;
  // Build a temp queue from previewArtist
  buildQueueFromArtist(previewArtist);
  qi = queue.findIndex(q => q.ali === ai && q.ti === ti);
  if (qi < 0) qi = 0;
  load();
}

function buildQueueFromArtist(a) {
  const base = baseOf(a._url);
  queue = [];
  (a.releases || []).forEach((alb, ali) => {
    const albBase = alb._base || base;
    const albCover = alb.cover ? resUrl(albBase, alb.cover) : null;
    (alb.tracks || []).forEach((t, ti) => {
      const src = (t.fromSingle || alb.type === 'playlist') ? resUrl(base, t.src) : resUrl(albBase, t.src);
      const cv = alb.type === 'singles' ? (t.cover ? resUrl(albBase, t.cover) : null) : albCover;
      queue.push({ title: t.title, artist: a.name, src, cover: cv, lyrics: t.lyrics||null, ali, ti });
    });
  });
}

function setAddTab(tab) {
  const linkBtn = document.getElementById('add-tab-link');
  const ghBtn   = document.getElementById('add-tab-gh');
  const linkPanel = document.getElementById('add-panel-link');
  const ghPanel   = document.getElementById('add-panel-gh');
  if (!linkBtn) return;
  linkBtn.style.background = tab === 'link' ? 'var(--surface2)' : 'transparent';
  linkBtn.style.color      = tab === 'link' ? 'var(--text)'     : 'var(--text3)';
  ghBtn.style.background   = tab === 'gh'   ? 'var(--surface2)' : 'transparent';
  ghBtn.style.color        = tab === 'gh'   ? 'var(--text)'     : 'var(--text3)';
  linkPanel.style.display  = tab === 'link' ? 'block' : 'none';
  ghPanel.style.display    = tab === 'gh'   ? 'block' : 'none';
  resetPreview();
}

function doFetchGh() {
  const user = document.getElementById('gh-user-input')?.value.trim();
  const repo = document.getElementById('gh-repo-input')?.value.trim() || 'music';
  if (!user) return;
  const url = 'https://' + user + '.github.io/' + repo + '/artist.json';
  document.getElementById('url-input').value = url;
  doFetch();
}

function openModal(pre) {
  document.getElementById('overlay').classList.add('on');
  resetPreview();
  if (pre) { document.getElementById('url-input').value = pre; setTimeout(doFetch, 250); }
  else { document.getElementById('url-input').value = ''; setTimeout(() => document.getElementById('url-input').focus(), 120); }
}
function closeModal() { document.getElementById('overlay').classList.remove('on'); }
let overlayDownOnBg = false;
function overlayMouseDown(e) { overlayDownOnBg = e.target === document.getElementById('overlay'); }
function overlayMouseUp(e) { if (overlayDownOnBg && e.target === document.getElementById('overlay')) closeModal(); overlayDownOnBg = false; }
function resetPreview() {
  pending = null;
  document.getElementById('prev').classList.remove('on');
  document.getElementById('merr').classList.remove('on');
  document.getElementById('btn-add').style.display = 'none';
  document.getElementById('btn-look').style.display = 'inline-flex';
}

async function doFetch() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  const spin = document.getElementById('spin');
  const merr = document.getElementById('merr');
  spin.classList.add('on'); merr.classList.remove('on');
  document.getElementById('btn-look').style.display = 'none';
  document.getElementById('prev').classList.remove('on');
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`Couldn't reach that URL (${r.status})`);
    const d = await r.json();
    if (!d.name) throw new Error("This doesn't look like a valid Unmuted artist file.");
    const base = baseOf(url);
    if (d.releases) {
      d.releases = (await Promise.all(d.releases.map(async alb => {
        if (typeof alb === 'string') {
          const albUrl = resUrl(base, alb);
          try {
            const ar = await fetch(albUrl);
            if (!ar.ok) return null; // release file missing — skip it
            const albData = await ar.json();
            albData._base = baseOf(albUrl);
            return albData;
          } catch { return null; } // network error — skip it
        }
        if (!alb._base) alb._base = base;
        return alb;
      }))).filter(Boolean); // remove nulls
    }
    d._url = url; pending = d;
    const av = d.avatar ? resUrl(base, d.avatar) : null;
    const pimg = document.getElementById('prev-img');
    const pph = document.getElementById('prev-ph');
    if (av) { pimg.src = av; pimg.style.display = 'block'; pimg.onerror = () => { pimg.style.display = 'none'; pph.textContent = d.name.charAt(0); }; pph.textContent = ''; }
    else { pimg.style.display = 'none'; pph.textContent = d.name.charAt(0); }
    document.getElementById('prev-name').textContent = d.name;
    const ac = (d.releases || []).length;
    document.getElementById('prev-sub').textContent = ac + (ac === 1 ? ' release' : ' releases') + (d.bio ? ' · ' + d.bio.slice(0, 55) + (d.bio.length > 55 ? '\u2026' : '') : '');
    document.getElementById('prev').classList.add('on');
    document.getElementById('btn-add').style.display = 'inline-flex';
    document.getElementById('btn-add').focus();
  } catch (e) {
    merr.textContent = e.message || 'Something went wrong. Check the link and try again.';
    merr.classList.add('on');
    document.getElementById('btn-look').style.display = 'inline-flex';
  } finally { spin.classList.remove('on'); }
}

function doAdd() {
  if (!pending) return;
  if (col.find(a => a._url === pending._url)) { toast('Already in your collection!'); closeModal(); return; }
  col.push(pending);
  localStorage.setItem('un_col', JSON.stringify(col));
  render(); closeModal();
  toast(`${pending.name} added! \uD83C\uDF89`);
}

let lyricsOpen = false;

let lrcLines = []; // [{time, text}] parsed from .lrc
let lrcInterval = null;

function parseLrc(lrc) {
  const lines = [];
  lrc.split('\n').forEach(line => {
    // Handle [mm:ss.xx] and [mm:ss:xx] formats
    const m = line.match(/^\[(\d+):(\d+[.:](\d+))\](.*)$/);
    if (m) {
      const mins = parseInt(m[1]);
      // Normalize separator — replace : with . if needed
      const secStr = m[2].replace(':', '.');
      const secs = parseFloat(secStr);
      const text = m[4].trim();
      lines.push({ time: mins * 60 + secs, text });
    }
  });
  return lines.sort((a, b) => a.time - b.time);
}

function updateLyrics(t) {
  const btn = document.getElementById('lyrics-btn');
  const hasLyrics = t.lyrics && t.lyrics.trim();
  btn.style.display = hasLyrics ? 'flex' : 'none';
  lrcLines = [];
  if (lrcInterval) { clearInterval(lrcInterval); lrcInterval = null; }

  if (hasLyrics) {
    const raw = t.lyrics.trim();
    const isLrc = raw.startsWith('[');
    const title = t.title;

    if (isLrc) {
      lrcLines = parseLrc(raw);
      renderLrcLines();
      startLrcHighlight();
    } else {
      renderLyricsContent(title, raw, false);
    }
    if (lyricsOpen) applyLyricsOpen(true);
  } else {
    if (lyricsOpen) { lyricsOpen = false; applyLyricsOpen(false); btn.classList.remove('active'); }
  }
}

function renderLrcLines() {
  const html = lrcLines.map((l, i) => {
    if (!l.text) return `<span class="lrc-line-blank" id="lrc-${i}"></span>`;
    return `<span class="lrc-line" id="lrc-${i}" style="cursor:pointer" onclick="seekToLine(${i})">${esc(l.text)}</span>`;
  }).join('');
  const panel = document.getElementById('lyrics-panel-text');
  if (panel) panel.innerHTML = html;
}

function renderLyricsContent(title, text, isLrc) {
  const lines = text.split('\n');
  const html = lines.map((l, i) => {
    if (!l.trim()) return `<span class="lrc-line-blank" id="lrc-${i}"></span>`;
    return `<span class="lrc-line" id="lrc-${i}">${esc(l)}</span>`;
  }).join('');
  const panel = document.getElementById('lyrics-panel-text');
  if (panel) panel.innerHTML = html;
}

function seekToLine(idx) {
  if (lrcLines[idx] != null) {
    aud.currentTime = lrcLines[idx].time;
    lrcUserScrolling = false; // snap back to this line immediately
  }
}

let lrcUserScrolling = false;
let lrcScrollTimer = null;

function startLrcHighlight() {
  if (lrcInterval) clearInterval(lrcInterval);

  // Detect user scroll — pause auto-scroll for 3s then resume
  const scrollEl = document.getElementById('lyrics-panel-scroll');
  if (scrollEl) {
    scrollEl.onscroll = () => {
      lrcUserScrolling = true;
      clearTimeout(lrcScrollTimer);
      lrcScrollTimer = setTimeout(() => { lrcUserScrolling = false; }, 3000);
    };
  }

  lrcInterval = setInterval(() => {
    if (!lrcLines.length || !aud.src) return;
    const cur = aud.currentTime;
    let active = -1;
    for (let i = 0; i < lrcLines.length; i++) {
      if (lrcLines[i].time <= cur) active = i;
    }

    // Highlight by ID — IDs match lrcLines indices exactly
    lrcLines.forEach((_, i) => {
      const el = document.getElementById(`lrc-${i}`);
      if (el) el.classList.toggle('active', i === active);
    });

    // Auto-scroll unless user is manually scrolling
    if (!lrcUserScrolling && active >= 0) {
      const activeEl = document.getElementById(`lrc-${active}`);
      const scrollDiv = document.getElementById('lyrics-panel-scroll');
      if (activeEl && scrollDiv) {
        const elTop = activeEl.offsetTop;
        const scrollH = scrollDiv.clientHeight;
        scrollDiv.scrollTo({ top: elTop - scrollH / 3, behavior: 'smooth' });
      }
    }
  }, 200);
}

function applyLyricsOpen(open) {
  document.getElementById('lyrics-panel').classList.toggle('up', open);
}

function toggleLyrics() {
  const btn = document.getElementById('lyrics-btn');
  lyricsOpen = !lyricsOpen;
  applyLyricsOpen(lyricsOpen);
  btn.classList.toggle('active', lyricsOpen);
}

function copyArtistLink(i) {
  const a = col[i];
  if (!a) return;
  const base = baseOf(a._url);
  const deep = 'https://unmuted-music.netlify.app/add#' + a._url;
  navigator.clipboard.writeText(deep).then(() => toast('Link copied! Share it anywhere \uD83D\uDD17'));
}

function removeArtist(i) {
  const name = col[i]?.name || 'this artist';
  if (!confirm(`Remove ${name} from your collection?`)) return;
  // If currently playing from this artist, stop
  if (queue.length && queue[0]?.artist === col[i]?.name) {
    aud.pause(); aud.src = ''; playing = false;
    queue = []; qi = -1;
    updatePP();
  }
  col.splice(i, 1);
  localStorage.setItem('un_col', JSON.stringify(col));
  render();
  goBack();
  toast(name + ' removed from your collection');
}

function followRec(url, btn) {
  if (col.some(a => a._url === url)) { toast('Already following!'); return; }
  fetch(url).then(r => r.json()).then(async d => {
    if (!d.name) return;
    const base = baseOf(url);
    if (d.releases) {
      d.releases = (await Promise.all(d.releases.map(async alb => {
        if (typeof alb !== 'string') { if (!alb._base) alb._base = base; return alb; }
        try {
          const ar = await fetch(resUrl(base, alb));
          if (!ar.ok) return null;
          const ad = await ar.json(); ad._base = baseOf(resUrl(base, alb)); return ad;
        } catch { return null; }
      }))).filter(Boolean);
    }
    d._url = url;
    col.push(d);
    localStorage.setItem('un_col', JSON.stringify(col));
    render();
    toast(d.name + ' added \uD83C\uDF89');
    if (btn) { btn.textContent = 'Following'; btn.disabled = true; }
  }).catch(() => toast('Could not load that artist'));
}

function baseOf(u) { return u ? u.substring(0, u.lastIndexOf('/') + 1) : ''; }
function resUrl(base, p) { if (!p) return ''; if (p.startsWith('http')) return p; return base + p; }
function fmt(s) { if (!s || isNaN(s)) return '0:00'; return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0'); }
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2800);
}

boot();
</script>
